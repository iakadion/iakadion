<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="400">
  <defs>
    <!-- Background: clean dark with subtle glow -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#161B22" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#0D1117" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="1"/>
    </radialGradient>
    <!-- Accent glow: subtle cyan -->
    <radialGradient id="accentGlow" cx="80%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>
    <!-- Text gradient: white to subtle gray -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#8B949E"/>
    </linearGradient>
    <!-- Subtle line gradient -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow filter for text -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="400" fill="#0D1117"/>
  <rect width="1200" height="400" fill="url(#bgGlow)"/>
  <rect width="1200" height="400" fill="url(#accentGlow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#FFFFFF" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Floating particles (minimal, clean) -->
  <g fill="#00E5FF" opacity="0.3">
    <circle cx="150" cy="80" r="1.5">
      <animate attributeName="cy" values="80;70;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="120" r="1">
      <animate attributeName="cy" values="120;110;120" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="250" r="1.5">
      <animate attributeName="cy" values="250;240;250" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="320" r="1">
      <animate attributeName="cy" values="320;310;320" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Logo mark: Hexagon with "A" -->
  <g transform="translate(600, 130)" filter="url(#softGlow)">
    <!-- Outer hexagon -->
    <polygon points="0,-42 36.4,-21 36.4,21 0,42 -36.4,21 -36.4,-21" 
             fill="none" stroke="#00E5FF" stroke-width="1.5" stroke-opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
    </polygon>
    <!-- Inner hexagon -->
    <polygon points="0,-28 24.2,-14 24.2,14 0,28 -24.2,14 -24.2,-14" 
             fill="#00E5FF" fill-opacity="0.08" stroke="#00E5FF" stroke-width="0.8" stroke-opacity="0.4">
      <animate attributeName="fill-opacity" values="0.05;0.12;0.05" dur="4s" repeatCount="indefinite"/>
    </polygon>
    <!-- Letter A -->
    <text x="0" y="8" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" 
          font-size="24" font-weight="900" fill="#FFFFFF" opacity="0.9">A</text>
  </g>

  <!-- Name -->
  <g filter="url(#softGlow)">
    <text x="600" y="220" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" 
          font-size="64" font-weight="800" letter-spacing="8" fill="url(#textGrad)">
      𝙂𝙚𝙣𝙝𝙤 𝘼𝙠𝙖𝙙𝙞𝙤𝙣
    </text>
  </g>

  <!-- Subtitle -->
  <text x="600" y="258" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" 
        font-size="13" font-weight="300" letter-spacing="12" fill="#8B949E" opacity="0.7">
    MULTIDIMENSIONAL CREATOR
  </text>

  <!-- Divider lines -->
  <line x1="0" y1="370" x2="1200" y2="370" stroke="url(#lineGrad)" stroke-width="1.5"/>
  <line x1="0" y1="378" x2="1200" y2="378" stroke="#21262D" stroke-width="1"/>

  <!-- Corner accents -->
  <g fill="none" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.2">
    <polyline points="50,50 50,30 70,30">
      <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="1150,50 1150,30 1130,30">
      <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="50,350 50,370 70,370">
      <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="1150,350 1150,370 1130,370">
      <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
    </polyline>
  </g>
</svg>
