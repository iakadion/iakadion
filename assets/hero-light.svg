<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="aurora1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#e8f4f8"/>
      <stop offset="50%" stop-color="#00f7f7" stop-opacity="0.06"/>
      <stop offset="75%" stop-color="#a855f7" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f7f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00f7f7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00f7f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#008080"/>
      <stop offset="50%" stop-color="#1a6b9e"/>
      <stop offset="100%" stop-color="#6b3fa0"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a6b9e"/>
      <stop offset="100%" stop-color="#666"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="320" fill="#ffffff"/>
  <rect width="1200" height="320" fill="url(#aurora1)"/>
  <line x1="0" y1="280" x2="1200" y2="280" stroke="url(#glow1)" stroke-width="2"/>
  <line x1="0" y1="282" x2="1200" y2="282" stroke="#00f7f7" stroke-opacity="0.04" stroke-width="1"/>
  <circle cx="200" cy="80" r="120" fill="#00f7f7" opacity="0.025"><animate attributeName="r" values="120;140;120" dur="8s" repeatCount="indefinite"/></circle>
  <circle cx="600" cy="60" r="160" fill="#a855f7" opacity="0.025"><animate attributeName="r" values="160;180;160" dur="10s" repeatCount="indefinite"/></circle>
  <circle cx="1000" cy="90" r="130" fill="#58a6ff" opacity="0.025"><animate attributeName="r" values="130;150;130" dur="7s" repeatCount="indefinite"/></circle>
  <text x="600" y="140" text-anchor="middle" font-family="'Space Grotesk','Segoe UI',sans-serif" font-size="64" font-weight="900" fill="url(#textGrad)" filter="url(#glow)">𝗚𝗘𝗡𝗛𝗢 𝗔𝗞𝗔𝗗𝗜𝗢𝗡</text>
  <text x="600" y="195" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="18" fill="url(#subGrad)" letter-spacing="4">⟐ MULTI-DIMENSIONAL CREATOR ⟐ CODE ⟐ MUSIC ⟐ ART ⟐</text>
  <text x="600" y="235" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="14" fill="#888" letter-spacing="2">Architect of the Akadion Ecosystem • Building the future one pixel at a time</text>
  <rect x="420" y="248" width="360" height="3" rx="1.5" fill="url(#glow1)"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="4s" repeatCount="indefinite"/></rect>
</svg>
