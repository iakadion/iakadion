<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 24" width="1200" height="24">
  <defs>
    <linearGradient id="dividerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#04040A" stop-opacity="0"/>
      <stop offset="30%" stop-color="#8534F3" stop-opacity="0.3"/>
      <stop offset="45%" stop-color="#8534F3" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.4"/>
      <stop offset="55%" stop-color="#8534F3" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#8534F3" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#04040A" stop-opacity="0"/>
    </linearGradient>
    <filter id="diamondGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="24" fill="#04040A"/>

  <line x1="0" y1="12" x2="1200" y2="12" stroke="url(#dividerGrad)" stroke-width="1"/>

  <g transform="translate(600, 12)" filter="url(#diamondGlow)">
    <polygon points="0,-6 4,0 0,6 -4,0" fill="#00E5FF" opacity="0.7">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <g transform="translate(600, 12)">
    <polygon points="0,-3 2,0 0,3 -2,0" fill="#00E5FF" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
    </polygon>
  </g>
</svg>