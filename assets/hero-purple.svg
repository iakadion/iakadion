<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%" fx="50%" fy="45%">
      <stop offset="0%" stop-color="#8534F3" stop-opacity="0.3"/>
      <stop offset="25%" stop-color="#8534F3" stop-opacity="0.12"/>
      <stop offset="55%" stop-color="#00E5FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#04040A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="edgeGlow" cx="85%" cy="75%" r="45%">
      <stop offset="0%" stop-color="#FE4C25" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#04040A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="baseLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#04040A" stop-opacity="0"/>
      <stop offset="20%" stop-color="#8534F3" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#8534F3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#04040A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E6E6E6"/>
      <stop offset="40%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B388FF"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6E7681" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#B388FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6E7681" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8534F3"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="#04040A"/>
  <rect width="1200" height="400" fill="url(#bgGlow)"/>
  <rect width="1200" height="400" fill="url(#edgeGlow)"/>

  <circle cx="120" cy="80" r="50" fill="none" stroke="#8534F3" stroke-width="1" stroke-opacity="0.12">
    <animate attributeName="r" values="40;55;40" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.08;0.2;0.08" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="80" r="25" fill="none" stroke="#00E5FF" stroke-width="0.5" stroke-opacity="0.15">
    <animate attributeName="r" values="20;30;20" dur="7s" repeatCount="indefinite"/>
  </circle>

  <circle cx="1080" cy="320" r="60" fill="none" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.1">
    <animate attributeName="r" values="48;65;48" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.06;0.18;0.06" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="320" r="30" fill="none" stroke="#8534F3" stroke-width="0.5" stroke-opacity="0.12">
    <animate attributeName="r" values="24;36;24" dur="9s" repeatCount="indefinite"/>
  </circle>

  <circle cx="1100" cy="60" r="18" fill="none" stroke="#FE4C25" stroke-width="0.5" stroke-opacity="0.12">
    <animate attributeName="r" values="12;20;12" dur="5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="70" cy="340" r="10" fill="#8534F3" opacity="0.12">
    <animate attributeName="opacity" values="0.08;0.25;0.08" dur="4s" repeatCount="indefinite"/>
  </circle>

  <g filter="url(#glow)">
    <hexagon/>
    <g transform="translate(600, 130)">
      <polygon points="0,-42 36.4,-21 36.4,21 0,42 -36.4,21 -36.4,-21" fill="none" stroke="url(#logoGrad)" stroke-width="2.5" stroke-opacity="0.9">
        <animate attributeName="stroke-opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="0,-28 24.2,-14 24.2,14 0,28 -24.2,14 -24.2,-14" fill="#8534F3" fill-opacity="0.15" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.5">
        <animate attributeName="fill-opacity" values="0.1;0.25;0.1" dur="3s" repeatCount="indefinite"/>
      </polygon>
      <text x="0" y="8" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-size="28" font-weight="900" fill="url(#logoGrad)" filter="url(#softGlow)">A</text>
    </g>
  </g>

  <g filter="url(#glow)">
    <text x="600" y="220" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="6" fill="url(#textGrad)">
      𝙂𝙚𝙣𝙝𝙤 𝘼𝙠𝙖𝙙𝙞𝙤𝙣
    </text>
  </g>

  <text x="600" y="262" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="300" letter-spacing="10" fill="url(#subGrad)">
    ✦ MULTIDIMENSIONAL CREATOR ✦
  </text>

  <line x1="0" y1="370" x2="1200" y2="370" stroke="url(#baseLine)" stroke-width="2"/>
  <line x1="0" y1="382" x2="1200" y2="382" stroke="url(#baseLine)" stroke-width="1" stroke-opacity="0.3"/>

  <g transform="translate(1060, 100)" opacity="0.45">
    <polygon points="0,-22 12.7,11 -12.7,11" fill="none" stroke="#00E5FF" stroke-width="1.5" stroke-opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite" additive="sum"/>
    </polygon>
  </g>

  <g transform="translate(100, 280)" opacity="0.3">
    <polygon points="0,-16 9.2,8 -9.2,8" fill="none" stroke="#FE4C25" stroke-width="1" stroke-opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="18s" repeatCount="indefinite" additive="sum"/>
    </polygon>
  </g>

  <g transform="translate(550, 310)" opacity="0.2">
    <polygon points="0,-10 5.8,5 -5.8,5" fill="#8534F3" fill-opacity="0.3" stroke="#8534F3" stroke-width="0.5" stroke-opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" additive="sum"/>
    </polygon>
  </g>

  <rect x="0" y="396" width="1200" height="4" fill="#8534F3" opacity="0.12">
    <animate attributeName="opacity" values="0.08;0.2;0.08" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>