<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <linearGradient id="rg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f7f7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="rg2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="rg3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#00f7f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="220" fill="#0d1117"/>

  <g transform="translate(450,110)" filter="url(#glow)">
    <g><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
      <ellipse rx="82" ry="30" fill="none" stroke="url(#rg1)" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.5"/>
    </g>
    <g><animateTransform attributeName="transform" type="rotate" from="90" to="450" dur="28s" repeatCount="indefinite"/>
      <ellipse rx="82" ry="30" fill="none" stroke="url(#rg2)" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.4" transform="rotate(60)"/>
    </g>
    <g><animateTransform attributeName="transform" type="rotate" from="180" to="540" dur="36s" repeatCount="indefinite"/>
      <ellipse rx="82" ry="30" fill="none" stroke="url(#rg3)" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.35" transform="rotate(-60)"/>
    </g>
    <circle r="4" fill="#00f7f7" opacity="0.8">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="450" y="116" text-anchor="middle" dominant-baseline="central" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-2">GENHO AKADION</text>
</svg>
